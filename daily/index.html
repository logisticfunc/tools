<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="daily-routine-version" content="2026-06-13-selected-run">
<title>每日时间 · v6</title>
<style>
  :root{
    --bg:#101113;--panel:#17191d;--panel2:#1d2026;--line:#2a2e36;
    --text:#f2efe7;--muted:#8b8a84;--dim:#55575a;--accent:#e9a83a;
    --danger:#d85b5b;--ok:#78b988;--blue:#7aa2d8;
    --wake:#c8b89a;--grow:#6f9b75;--family:#d3aa55;--commute:#62756c;
    --eat:#6a6258;--work:#526b9d;--phone:#8c4d4d;--couple:#9a6f91;--sleep:#303a52;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  }
  button,input,select{font:inherit}
  .app{max-width:1280px;margin:0 auto;padding:28px 28px 44px}
  .top{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:22px}
  .date{font-size:18px;font-weight:700;letter-spacing:.02em}
  .sub{color:var(--muted);font-size:12px;margin-top:4px}
  .clock{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
  .clock em{font-style:normal;color:var(--muted);font-size:14px;margin-left:3px}
  .layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:18px;align-items:start}
  .panel{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    box-shadow:0 18px 60px rgba(0,0,0,.22);
  }
  .section{padding:18px}
  .section+.section{border-top:1px solid var(--line)}
  .rowhead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .label{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px}
  .legend b{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
  .ruler{position:relative;height:22px;margin-left:64px;margin-bottom:2px;color:var(--dim);font-size:11px}
  .tick{position:absolute;top:0;transform:translateX(-50%);font-variant-numeric:tabular-nums}
  .trackline{
    position:relative;display:grid;grid-template-columns:52px minmax(0,1fr);gap:12px;
    align-items:center;margin:10px 0;
  }
  .tracklabel{color:var(--muted);font-size:12px;text-align:right}
  .track{
    position:relative;height:54px;background:#111317;border:1px solid var(--line);
    border-radius:7px;overflow:hidden;
  }
  .seg{
    position:absolute;top:0;bottom:0;min-width:2px;border-right:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.88);
    font-size:12px;font-weight:650;overflow:hidden;white-space:nowrap;
  }
  .seg.future{opacity:.32}
  .seg.deviated{box-shadow:inset 0 0 0 2px rgba(216,91,91,.55)}
  .seg.onplan::after{content:"";position:absolute;left:5px;bottom:5px;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.62)}
  .seg.tiny span{display:none}
  .nowline{
    position:absolute;top:-28px;bottom:-6px;width:2px;background:var(--danger);z-index:10;
    box-shadow:0 0 0 1px rgba(216,91,91,.15),0 0 16px rgba(216,91,91,.3);
    pointer-events:none;
  }
  .nowline::before{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid var(--danger)}
  .focusgrid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}
  .nowcard{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:14px}
  .nowtitle{font-size:22px;font-weight:800;margin-bottom:6px}
  .meta{color:var(--muted);font-size:13px}
  .meter{height:7px;background:#101216;border-radius:999px;overflow:hidden;margin-top:12px}
  .meter span{display:block;height:100%;background:var(--accent);border-radius:999px}
  .actions{display:flex;gap:8px;flex-wrap:wrap;align-content:flex-start}
  .btn{
    border:1px solid var(--line);background:#20232a;color:var(--text);border-radius:7px;
    padding:9px 12px;cursor:pointer;min-height:38px;
  }
  .btn:hover{border-color:#3d4655;background:#252932}
  .btn.primary{border-color:rgba(233,168,58,.6);background:rgba(233,168,58,.13);color:#ffd783}
  .btn.danger{border-color:rgba(216,91,91,.45);color:#ffb1b1;background:rgba(216,91,91,.1)}
  .form{display:none;gap:10px;align-items:end;flex-wrap:wrap}
  .form.open{display:flex}
  .field{display:flex;flex-direction:column;gap:5px;min-width:120px}
  .field.grow{flex:1;min-width:180px}
  .field span{font-size:11px;color:var(--muted)}
  .quickset{display:flex;gap:8px;flex-wrap:wrap;width:100%;padding-top:2px}
  .chip{
    border:1px solid rgba(255,255,255,.08);background:#15171c;color:var(--muted);
    border-radius:999px;padding:6px 10px;cursor:pointer;font-size:12px;
  }
  .chip:hover{color:var(--text);border-color:#3d4655;background:#20232a}
  select,input{
    background:#101216;color:var(--text);border:1px solid var(--line);
    border-radius:7px;padding:8px 9px;outline:none;
  }
  select:focus,input:focus{border-color:var(--accent)}
  .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .metric{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px}
  .metric .name{color:var(--muted);font-size:12px}
  .metric .value{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:4px}
  .metric .delta{font-size:12px;margin-top:4px;color:var(--muted)}
  .metric.bad .delta{color:#ff9d9d}
  .side{display:flex;flex-direction:column;gap:18px}
  .loglist{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto}
  .logitem{display:grid;grid-template-columns:44px minmax(0,1fr) 26px;gap:8px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:8px}
  .logtime{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px}
  .logdesc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .x{width:24px;height:24px;border:0;border-radius:5px;background:transparent;color:var(--muted);cursor:pointer}
  .x:hover{background:rgba(216,91,91,.14);color:#ff9d9d}
  .empty{color:var(--dim);font-style:italic;padding:10px 2px}
  .data-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .syncform{display:flex;flex-direction:column;gap:10px;margin-top:12px}
  .syncrow{display:grid;grid-template-columns:1fr;gap:8px}
  .syncstatus{min-height:18px;color:var(--muted);font-size:12px}
  .syncstatus.ok{color:#a8d8b1}
  .syncstatus.bad{color:#ff9d9d}
  .detail{color:var(--muted);font-size:13px}
  .detail b{color:var(--text)}
  .notice{
    margin-top:12px;padding:10px 11px;border:1px solid rgba(233,168,58,.28);
    background:rgba(233,168,58,.08);border-radius:7px;color:#d8c39a;font-size:12px;
  }
  .notice b{color:#ffd783}
  @media(max-width:920px){
    .app{padding:18px 14px 36px}
    .layout{grid-template-columns:1fr}
    .focusgrid{grid-template-columns:1fr}
    .summary{grid-template-columns:repeat(2,1fr)}
    .ruler{margin-left:0}
    .trackline{grid-template-columns:1fr;gap:6px}
    .tracklabel{text-align:left}
    .track{height:48px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <div class="date" id="dateText">--</div>
      <div class="sub" id="dayNote">计划固定，实际只记录偏离</div>
    </div>
    <div class="clock" id="clockText">--:--<em>--</em></div>
  </header>

  <main class="layout">
    <div class="panel">
      <section class="section">
        <div class="rowhead">
          <div class="label">Plan / Actual</div>
          <div class="legend" id="legend"></div>
        </div>
        <div class="ruler" id="ruler"></div>
        <div class="trackline">
          <div class="tracklabel">计划</div>
          <div class="track" id="planTrack"></div>
        </div>
        <div class="trackline">
          <div class="tracklabel">实际</div>
          <div class="track" id="actualTrack"></div>
        </div>
      </section>

      <section class="section">
        <div class="focusgrid">
          <div class="nowcard">
            <div class="label" id="focusLabel">Now</div>
            <div class="nowtitle" id="nowTitle">--</div>
            <div class="meta" id="nowMeta">--</div>
            <div class="meter"><span id="nowMeter"></span></div>
          </div>
          <div class="actions">
            <button class="btn primary" id="openDeviation">记录偏离</button>
            <button class="btn" id="logSleep">我睡了</button>
            <button class="btn" id="logWake">我起了</button>
            <button class="btn" id="addNote">备注</button>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="form" id="deviationForm">
          <label class="field">
            <span>实际</span>
            <select id="actualAct">
              <option value="">选择活动</option>
              <option>起床</option><option>进步</option><option>亲子</option><option>路上</option>
              <option>吃饭</option><option>上班</option><option>刷手机</option><option>夫妻</option><option>睡觉</option>
            </select>
          </label>
          <label class="field">
            <span>开始</span>
            <input type="time" id="fromTime">
          </label>
          <label class="field">
            <span>结束</span>
            <input type="time" id="toTime">
          </label>
          <label class="field grow">
            <span>备注</span>
            <input type="text" id="devNote" placeholder="可选">
          </label>
          <button class="btn" id="cancelDeviation">取消</button>
          <button class="btn primary" id="saveDeviation">记录</button>
          <div class="quickset" aria-label="快速记录">
            <button class="chip" id="quickPhone" type="button">刷手机到现在</button>
            <button class="chip" id="quickLateWake" type="button">延迟起床</button>
            <button class="chip" id="quickEarlySleep" type="button">提前睡觉</button>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="rowhead">
          <div class="label">Today</div>
          <div class="detail" id="todayDetail">--</div>
        </div>
        <div class="summary" id="summary"></div>
      </section>
    </div>

    <aside class="side">
      <div class="panel section">
        <div class="rowhead">
          <div class="label">Records</div>
          <div class="detail" id="recordCount">0 条</div>
        </div>
        <div class="loglist" id="logList"></div>
        <div class="data-actions">
          <button class="btn" id="exportData">导出</button>
          <button class="btn" id="importData">导入</button>
          <button class="btn danger" id="clearToday">清空今日</button>
          <input type="file" id="fileInput" accept=".json" hidden>
        </div>
        <div class="notice"><b>发布版提示：</b>本地文件和 GitHub Pages 的记录互不相通。上线前后迁移数据请先导出，再在新页面导入。</div>
      </div>
      <div class="panel section">
        <div class="rowhead">
          <div class="label">Sync</div>
          <div class="detail" id="syncMode">手动</div>
        </div>
        <div class="detail">公开页面只提供工具界面；同步数据会先在浏览器加密，再写入 GitHub Gist。Token 和同步密码只保存在当前浏览器。</div>
        <div class="syncform">
          <label class="field grow">
            <span>GitHub Token</span>
            <input type="password" id="syncToken" autocomplete="off" placeholder="需要 Gist 读写权限">
          </label>
          <label class="field grow">
            <span>同步密码</span>
            <input type="password" id="syncPassphrase" autocomplete="off" placeholder="每台设备填写同一个密码">
          </label>
          <label class="field grow">
            <span>Gist ID</span>
            <input type="text" id="syncGist" autocomplete="off" placeholder="留空则推送时新建私有 Gist">
          </label>
          <label class="field grow">
            <span>文件名</span>
            <input type="text" id="syncFile" autocomplete="off" value="daily-routine-data.json">
          </label>
          <div class="data-actions">
            <button class="btn" id="saveSync">保存配置</button>
            <button class="btn primary" id="pushSync">推送</button>
            <button class="btn" id="pullSync">拉取</button>
          </div>
          <div class="syncstatus" id="syncStatus">未配置同步。</div>
        </div>
      </div>
      <div class="panel section">
        <div class="label">Selected</div>
        <div class="detail" id="selectedDetail">点击实际轴上的色块查看详情。</div>
      </div>
    </aside>
  </main>
</div>

<script>
const WKD=[{a:'起床',s:[7,30],e:[7,45]},{a:'进步',s:[7,45],e:[8,30]},{a:'亲子',s:[8,30],e:[8,45]},{a:'路上',s:[8,45],e:[10,0]},{a:'吃饭',s:[10,0],e:[10,15]},{a:'上班',s:[10,15],e:[12,0]},{a:'进步',s:[12,0],e:[13,15]},{a:'刷手机',s:[13,15],e:[13,30]},{a:'睡觉',s:[13,30],e:[14,0],l:'午休'},{a:'上班',s:[14,0],e:[17,45]},{a:'吃饭',s:[17,45],e:[18,15]},{a:'进步',s:[18,15],e:[20,30]},{a:'路上',s:[20,30],e:[21,45]},{a:'亲子',s:[21,45],e:[23,0]},{a:'夫妻',s:[23,0],e:[0,15]},{a:'刷手机',s:[0,15],e:[0,30]},{a:'睡觉',s:[0,30],e:[7,30]}];
const WKE=[{a:'起床',s:[7,30],e:[7,45]},{a:'进步',s:[7,45],e:[9,0]},{a:'亲子',s:[9,0],e:[14,0]},{a:'睡觉',s:[14,0],e:[16,0],l:'午休'},{a:'亲子',s:[16,0],e:[23,0]},{a:'夫妻',s:[23,0],e:[0,15]},{a:'刷手机',s:[0,15],e:[0,30]},{a:'睡觉',s:[0,30],e:[7,30]}];
const DAYS=['周日','周一','周二','周三','周四','周五','周六'];
const ACTS=['睡觉','进步','亲子','夫妻'];
const COLOR={起床:'--wake',进步:'--grow',亲子:'--family',路上:'--commute',吃饭:'--eat',上班:'--work',刷手机:'--phone',夫妻:'--couple',睡觉:'--sleep'};
const SHORT={起床:'起',进步:'进步',亲子:'亲子',路上:'路上',吃饭:'吃饭',上班:'上班',刷手机:'手机',夫妻:'夫妻',睡觉:'睡觉'};
const SYNC_KEY='daily-routine-sync';
let selected=null;

function pad(n){return n<10?'0'+n:''+n}
function keyOf(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function todayKey(){return keyOf(new Date())}
function tm(t){return t[0]*60+t[1]}
function parseTime(s){const p=s.split(':');return Number(p[0])*60+Number(p[1])}
function fmt(min){min=((min%1440)+1440)%1440;return pad(Math.floor(min/60))+':'+pad(min%60)}
function durText(m){m=Math.max(0,Math.round(m));const h=Math.floor(m/60),r=m%60;return h?(r?h+'h'+pad(r):h+'h'):r+'m'}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function getLog(dk){try{const raw=localStorage.getItem('dr-log-'+dk);return raw?JSON.parse(raw):null}catch(e){return null}}
function saveLog(log){localStorage.setItem('dr-log-'+log.date,JSON.stringify(log));updateIndex(log.date)}
function updateIndex(dk){let idx=[];try{idx=JSON.parse(localStorage.getItem('dr-log-index')||'[]')}catch(e){};if(!idx.includes(dk))idx.push(dk);idx.sort().reverse();localStorage.setItem('dr-log-index',JSON.stringify(idx.slice(0,90)))}
function addEntry(entry){const now=new Date(),dk=todayKey();const log=getLog(dk)||{date:dk,st:(now.getDay()===0||now.getDay()===6)?'we':'wd',entries:[]};log.entries.push(entry);saveLog(log)}
function collectDrData(){const data={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('dr-'))data[k]=localStorage.getItem(k)}return data}
function replaceDrData(data){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('dr-'))keys.push(k)}keys.forEach(k=>localStorage.removeItem(k));for(const k in data){if(k.startsWith('dr-'))localStorage.setItem(k,typeof data[k]==='string'?data[k]:JSON.stringify(data[k]))}}
function loadSyncConfig(){try{return JSON.parse(localStorage.getItem(SYNC_KEY)||'{}')}catch(e){return {}}}
function saveSyncConfig(cfg){localStorage.setItem(SYNC_KEY,JSON.stringify(cfg))}
function setSyncStatus(msg,kind){const el=document.getElementById('syncStatus');el.textContent=msg;el.className='syncstatus '+(kind||'')}
function syncPayload(){return {version:1,updatedAt:new Date().toISOString(),data:collectDrData()}}
function readSyncForm(){return {
  token:document.getElementById('syncToken').value.trim(),
  passphrase:document.getElementById('syncPassphrase').value,
  gistId:document.getElementById('syncGist').value.trim(),
  fileName:document.getElementById('syncFile').value.trim()||'daily-routine-data.json'
}}
function fillSyncForm(){
  const cfg=loadSyncConfig();
  document.getElementById('syncToken').value=cfg.token||'';
  document.getElementById('syncPassphrase').value=cfg.passphrase||'';
  document.getElementById('syncGist').value=cfg.gistId||'';
  document.getElementById('syncFile').value=cfg.fileName||'daily-routine-data.json';
  setSyncStatus(cfg.gistId?'已配置 Gist '+cfg.gistId+'。':'未配置同步。',cfg.gistId?'ok':'');
}
function bytesToB64(bytes){let s='';bytes.forEach(b=>s+=String.fromCharCode(b));return btoa(s)}
function b64ToBytes(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function deriveSyncKey(passphrase,salt){
  if(!crypto.subtle)throw new Error('当前浏览器不支持 Web Crypto。');
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(passphrase),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptSyncPayload(payload,passphrase){
  const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveSyncKey(passphrase,salt);
  const clear=new TextEncoder().encode(JSON.stringify(payload));
  const cipher=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,clear));
  return {version:2,encrypted:true,algorithm:'AES-GCM',kdf:'PBKDF2-SHA-256',iterations:200000,updatedAt:payload.updatedAt,salt:bytesToB64(salt),iv:bytesToB64(iv),ciphertext:bytesToB64(cipher)};
}
async function decryptSyncPayload(payload,passphrase){
  if(payload&&payload.data)return payload;
  if(!payload||!payload.encrypted)throw new Error('同步文件格式不正确。');
  if(!passphrase)throw new Error('请输入同步密码。');
  const salt=b64ToBytes(payload.salt),iv=b64ToBytes(payload.iv),cipher=b64ToBytes(payload.ciphertext);
  const key=await deriveSyncKey(passphrase,salt);
  const clear=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,cipher);
  return JSON.parse(new TextDecoder().decode(clear));
}
async function githubRequest(url,opts,cfg){
  const res=await fetch(url,{...opts,headers:{'Authorization':'Bearer '+cfg.token,'Accept':'application/vnd.github+json','Content-Type':'application/json','X-GitHub-Api-Version':'2022-11-28',...(opts&&opts.headers||{})}});
  if(!res.ok){let msg=res.status+' '+res.statusText;try{const data=await res.json();if(data&&data.message)msg=data.message}catch(e){}throw new Error(msg)}
  return res.json();
}
async function pushToGist(){
  const cfg=readSyncForm();if(!cfg.token){setSyncStatus('请先填写 GitHub Token。','bad');return}
  if(!cfg.passphrase){setSyncStatus('请先填写同步密码。云端只保存加密后的数据。','bad');return}
  setSyncStatus('正在推送...', '');
  try{
    const body=JSON.stringify(await encryptSyncPayload(syncPayload(),cfg.passphrase),null,2);
    if(!cfg.gistId){
      const gist=await githubRequest('https://api.github.com/gists',{method:'POST',body:JSON.stringify({description:'DailyRoutine data',public:false,files:{[cfg.fileName]:{content:body}}})},cfg);
      cfg.gistId=gist.id;document.getElementById('syncGist').value=cfg.gistId;saveSyncConfig(cfg);
      setSyncStatus('已新建加密 Gist 并推送：'+cfg.gistId,'ok');
    }else{
      await githubRequest('https://api.github.com/gists/'+encodeURIComponent(cfg.gistId),{method:'PATCH',body:JSON.stringify({files:{[cfg.fileName]:{content:body}}})},cfg);
      saveSyncConfig(cfg);setSyncStatus('已加密推送 '+Object.keys(collectDrData()).length+' 个数据键。','ok');
    }
  }catch(e){setSyncStatus('推送失败：'+e.message,'bad')}
}
async function pullFromGist(){
  const cfg=readSyncForm();if(!cfg.token||!cfg.gistId){setSyncStatus('请先填写 GitHub Token 和 Gist ID。','bad');return}
  if(!confirm('从云端拉取会替换本地所有 dr-* 记录。继续？'))return;
  setSyncStatus('正在拉取...', '');
  try{
    const gist=await githubRequest('https://api.github.com/gists/'+encodeURIComponent(cfg.gistId),{method:'GET'},cfg);
    const file=gist.files&&gist.files[cfg.fileName];if(!file||!file.content)throw new Error('Gist 中没有文件 '+cfg.fileName);
    const payload=await decryptSyncPayload(JSON.parse(file.content),cfg.passphrase),data=payload.data||payload;
    replaceDrData(data);saveSyncConfig(cfg);selected=null;update();
    setSyncStatus('已拉取 '+Object.keys(data).filter(k=>k.startsWith('dr-')).length+' 个数据键。','ok');
  }catch(e){setSyncStatus('拉取失败：'+e.message,'bad')}
}

function splitBlock(b){
  const s=tm(b.s),e0=tm(b.e),name=b.l||b.a;
  if(e0<=s){
    return [
      {a:b.a,label:name,s:s,e:1440,source:b.a},
      {a:b.a,label:name,s:0,e:e0,source:b.a}
    ];
  }
  return [{a:b.a,label:name,s:s,e:e0,source:b.a}];
}
function planSegments(schedule){
  return schedule.flatMap(splitBlock).filter(x=>x.e>x.s).sort((a,b)=>a.s-b.s);
}
function clipSegments(segs,start,end,actual,note){
  if(end<=start)end=start+1;
  const out=[];
  for(const seg of segs){
    if(end<=seg.s||start>=seg.e){out.push(seg);continue}
    if(seg.s<start)out.push({...seg,e:start});
    const ms=Math.max(seg.s,start),me=Math.min(seg.e,end);
    out.push({...seg,s:ms,e:me,actual,planned:seg.a,note,deviated:actual!==seg.a});
    if(end<seg.e)out.push({...seg,s:end});
  }
  return mergeAdjacent(out.filter(x=>x.e>x.s));
}
function mergeAdjacent(segs){
  const out=[];
  for(const s of segs.sort((a,b)=>a.s-b.s)){
    const last=out[out.length-1];
    const act=s.actual||s.a, lastAct=last&&(last.actual||last.a);
    if(last&&last.e===s.s&&lastAct===act&&last.a===s.a&&last.deviated===s.deviated&&!s.note&&!last.note){
      last.e=s.e;
    }else out.push({...s});
  }
  return out;
}
function actualSegments(schedule,entries){
  let segs=planSegments(schedule).map(s=>({...s,actual:s.a,planned:s.a,deviated:false}));
  const sorted=(entries||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  for(const ent of sorted){
    if(!ent.time)continue;
    if(ent.type==='override'){
      let s=parseTime(ent.time),e=ent.endTime?parseTime(ent.endTime):s+1;
      if(e<=s){
        segs=clipSegments(segs,s,1440,ent.actual,ent.note||'');
        if(e>0)segs=clipSegments(segs,0,e,ent.actual,ent.note||'');
      }else{
        segs=clipSegments(segs,s,Math.min(e,1440),ent.actual,ent.note||'');
      }
    }
    if(ent.type==='wake_up'){
      const t=parseTime(ent.time);
      if(t>450)segs=clipSegments(segs,450,Math.min(t,900),'睡觉','起床晚');
    }
    if(ent.type==='sleep_start'){
      const t=parseTime(ent.time);
      if(t>30&&t<360)segs=clipSegments(segs,30,t,'刷手机','晚睡');
      if(t>=1380)segs=clipSegments(segs,t,1440,'睡觉','提前入睡');
    }
  }
  return mergeAdjacent(segs);
}
function currentSchedule(){
  const d=new Date();return (d.getDay()===0||d.getDay()===6)?WKE:WKD;
}
function currentMinute(){const d=new Date();return d.getHours()*60+d.getMinutes()}
function segmentAt(segs,min){return segs.find(s=>min>=s.s&&min<s.e)||segs[segs.length-1]}
function colorFor(a){return 'var('+COLOR[a]+')'}
function actualName(seg){return seg.actual||seg.a}
function actualRunFor(segs,target){
  const act=actualName(target);
  let start=target.s,end=target.e;
  const sorted=segs.slice().sort((a,b)=>a.s-b.s);
  let changed=true;
  while(changed){
    changed=false;
    for(const s of sorted){
      if(actualName(s)!==act)continue;
      if(s.e===start){start=s.s;changed=true}
      if(s.s===end){end=s.e;changed=true}
    }
  }
  const pieces=sorted.filter(s=>s.s>=start&&s.e<=end&&actualName(s)===act);
  return {
    ...target,
    s:start,
    e:end,
    actual:act,
    planned:pieces.map(s=>s.planned||s.a).filter((v,i,a)=>v&&a.indexOf(v)===i).join(' / '),
    note:pieces.map(s=>s.note).filter(Boolean).join(' / '),
    deviated:pieces.some(s=>s.deviated)
  };
}
function renderSeg(seg,now,kind,allSegs){
  const left=seg.s/1440*100,width=(seg.e-seg.s)/1440*100;
  const div=document.createElement('button');
  div.className='seg '+(width<3.8?'tiny ':'')+(kind==='actual'?(seg.deviated?'deviated ':'onplan '):'')+(seg.s>=now?'future ':'');
  div.style.left=left+'%';div.style.width=width+'%';div.style.background=colorFor(actualName(seg));
  div.style.border=0;div.style.cursor=kind==='actual'?'pointer':'default';
  div.innerHTML='<span>'+esc(SHORT[actualName(seg)]||actualName(seg))+'</span>';
  div.title=actualName(seg)+' '+fmt(seg.s)+'-'+fmt(seg.e);
  if(kind==='actual'){
    div.addEventListener('click',()=>{selected=actualRunFor(allSegs,seg);renderSelected(selected);update()});
  }
  return div;
}
function renderTracks(plan,actual,now){
  const planEl=document.getElementById('planTrack'),actEl=document.getElementById('actualTrack');
  planEl.innerHTML='';actEl.innerHTML='';
  for(const s of plan)planEl.appendChild(renderSeg(s,now,'plan',plan));
  for(const s of actual)actEl.appendChild(renderSeg(s,now,'actual',actual));
  const line=document.createElement('div');line.className='nowline';line.style.left=(now/1440*100)+'%';actEl.appendChild(line);
}
function renderRuler(){
  const r=document.getElementById('ruler');r.innerHTML='';
  [0,6,9,12,15,18,21,24].forEach(h=>{
    const t=document.createElement('span');t.className='tick';t.style.left=(h/24*100)+'%';t.textContent=pad(h%24)+':00';r.appendChild(t);
  });
}
function renderLegend(){
  const l=document.getElementById('legend');l.innerHTML='';
  ['睡觉','进步','亲子','上班','刷手机'].forEach(a=>{
    const s=document.createElement('span');s.innerHTML='<b style="background:'+colorFor(a)+'"></b>'+a;l.appendChild(s);
  });
}
function currentFocusSegment(actual,now){
  if(!selected)return segmentAt(actual,now);
  const seg=actual.find(s=>selected.s>=s.s&&selected.s<s.e&&actualName(s)===actualName(selected));
  return seg?actualRunFor(actual,seg):selected;
}
function renderFocus(actual,now){
  const seg=currentFocusSegment(actual,now);if(!seg)return;
  const isSelected=!!selected,act=actualName(seg),total=seg.e-seg.s;
  const done=isSelected?total:Math.max(0,now-seg.s);
  document.getElementById('focusLabel').textContent=isSelected?'Selected':'Now';
  document.getElementById('nowTitle').textContent=act;
  document.getElementById('nowMeta').textContent=isSelected
    ? fmt(seg.s)+'-'+fmt(seg.e)+' · '+durText(total)+(seg.deviated?' · 原计划 '+seg.planned:' · 按计划')
    : fmt(seg.s)+'-'+fmt(seg.e)+' · 已过 '+durText(done)+' · 剩余 '+durText(seg.e-now)+(seg.deviated?' · 原计划 '+seg.planned:'');
  document.getElementById('nowMeter').style.width=Math.min(100,done/total*100)+'%';
}
function renderSummary(plan,actual,now){
  const data={};ACTS.forEach(a=>data[a]={plan:0,actual:0});
  for(const s of plan)if(data[s.a])data[s.a].plan+=Math.max(0,Math.min(s.e,now)-s.s);
  for(const s of actual)if(data[s.actual||s.a])data[s.actual||s.a].actual+=Math.max(0,Math.min(s.e,now)-s.s);
  let diff=0;for(const s of actual){const e=Math.min(s.e,now);if(e>s.s&&s.deviated)diff+=e-s.s}
  document.getElementById('todayDetail').textContent='截至当前偏离 '+durText(diff);
  const el=document.getElementById('summary');el.innerHTML='';
  ACTS.forEach(a=>{
    const d=data[a],delta=d.actual-d.plan;
    const card=document.createElement('div');card.className='metric '+(delta<0?'bad':'');
    card.innerHTML='<div class="name">'+a+'</div><div class="value">'+durText(d.actual)+'</div><div class="delta">计划 '+durText(d.plan)+' · '+(delta>=0?'+':'-')+durText(Math.abs(delta))+'</div>';
    el.appendChild(card);
  });
}
function describeEntry(e){
  if(e.type==='override')return (e.scheduled||'计划')+' -> '+e.actual+' · '+e.time+(e.endTime?'-'+e.endTime:'')+(e.note?' · '+e.note:'');
  if(e.type==='wake_up')return '起床 · '+e.time;
  if(e.type==='sleep_start')return '入睡 · '+e.time;
  if(e.type==='note')return '备注 · '+e.note;
  return e.type;
}
function renderLog(){
  const log=getLog(todayKey()),entries=log?log.entries:[];
  document.getElementById('recordCount').textContent=entries.length+' 条';
  const list=document.getElementById('logList');list.innerHTML='';
  if(!entries.length){list.innerHTML='<div class="empty">今天还没有记录。</div>';return}
  entries.map((e,i)=>({e,i})).sort((a,b)=>(a.e.time||'99:99').localeCompare(b.e.time||'99:99')).forEach(({e,i})=>{
    const item=document.createElement('div');item.className='logitem';
    item.innerHTML='<div class="logtime">'+esc(e.time||'--')+'</div><div class="logdesc">'+esc(describeEntry(e))+'</div><button class="x" title="撤销">×</button>';
    item.querySelector('.x').addEventListener('click',()=>{
      const log=getLog(todayKey());if(!log)return;log.entries.splice(i,1);saveLog(log);update();
    });
    list.appendChild(item);
  });
}
function renderSelected(seg){
  const detail=document.getElementById('selectedDetail');
  detail.innerHTML='<p><b>'+esc(actualName(seg))+'</b> · '+fmt(seg.s)+'-'+fmt(seg.e)+' · '+durText(seg.e-seg.s)+'</p>'+
    (seg.deviated?'<p>原计划：<b>'+esc(seg.planned)+'</b>'+(seg.note?' · '+esc(seg.note):'')+'</p>':'<p>按计划执行。</p>');
  document.getElementById('fromTime').value=fmt(seg.s);
  document.getElementById('toTime').value=fmt(seg.e);
}
function update(){
  const nowDate=new Date(),now=currentMinute(),sch=currentSchedule(),log=getLog(todayKey()),entries=log?log.entries:[];
  const plan=planSegments(sch),actual=actualSegments(sch,entries);
  document.getElementById('dateText').textContent=keyOf(nowDate)+' '+DAYS[nowDate.getDay()];
  document.getElementById('dayNote').textContent=(nowDate.getDay()===0||nowDate.getDay()===6)?'周末模板':'工作日模板';
  document.getElementById('clockText').innerHTML=pad(nowDate.getHours())+':'+pad(nowDate.getMinutes())+'<em>'+pad(nowDate.getSeconds())+'</em>';
  renderTracks(plan,actual,now);renderFocus(actual,now);renderSummary(plan,actual,now);renderLog();
}
function openDeviation(){
  const f=document.getElementById('deviationForm');f.classList.add('open');
  const now=currentMinute(),sch=currentSchedule(),seg=segmentAt(planSegments(sch),now);
  document.getElementById('fromTime').value=fmt(selected?selected.s:seg.s);
  document.getElementById('toTime').value=fmt(selected?selected.e:now);
  document.getElementById('actualAct').value=selected?(selected.actual||selected.a):'';
  document.getElementById('devNote').value='';
}
function recordOverride(actual,fromMin,toMin,note){
  const from=fmt(fromMin),to=fmt(toMin),plan=segmentAt(planSegments(currentSchedule()),fromMin);
  addEntry({type:'override',time:from,endTime:to,actual,scheduled:plan?plan.a:'',note:note||undefined});
  document.getElementById('deviationForm').classList.remove('open');selected=null;update();
}
function currentPlanSegment(){return segmentAt(planSegments(currentSchedule()),currentMinute())}
document.getElementById('openDeviation').addEventListener('click',openDeviation);
document.getElementById('cancelDeviation').addEventListener('click',()=>document.getElementById('deviationForm').classList.remove('open'));
document.getElementById('saveDeviation').addEventListener('click',()=>{
  const act=document.getElementById('actualAct').value;if(!act)return;
  const from=document.getElementById('fromTime').value,to=document.getElementById('toTime').value;if(!from||!to)return;
  recordOverride(act,parseTime(from),parseTime(to),document.getElementById('devNote').value.trim());
});
document.getElementById('quickPhone').addEventListener('click',()=>{
  const now=currentMinute(),seg=selected||currentPlanSegment();
  const start=seg&&seg.s<now?seg.s:Math.max(0,now-15);
  recordOverride('刷手机',start,now,'快速记录');
});
document.getElementById('quickLateWake').addEventListener('click',()=>{
  const now=currentMinute();
  if(now<=450){alert('现在还早于计划起床时间。');return}
  recordOverride('睡觉',450,now,'延迟起床');
});
document.getElementById('quickEarlySleep').addEventListener('click',()=>{
  const now=currentMinute();
  recordOverride('睡觉',now,1440,'提前睡觉');
});
document.getElementById('logWake').addEventListener('click',()=>{const d=new Date();addEntry({type:'wake_up',time:pad(d.getHours())+':'+pad(d.getMinutes())});update()});
document.getElementById('logSleep').addEventListener('click',()=>{const d=new Date();addEntry({type:'sleep_start',time:pad(d.getHours())+':'+pad(d.getMinutes())});update()});
document.getElementById('addNote').addEventListener('click',()=>{const note=prompt('备注');if(!note||!note.trim())return;const d=new Date();addEntry({type:'note',time:pad(d.getHours())+':'+pad(d.getMinutes()),note:note.trim()});update()});
document.getElementById('clearToday').addEventListener('click',()=>{if(confirm('清空今日记录？')){localStorage.removeItem('dr-log-'+todayKey());selected=null;update()}});
document.getElementById('exportData').addEventListener('click',()=>{
  const data=collectDrData();
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='daily-routine-'+todayKey()+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);
});
document.getElementById('importData').addEventListener('click',()=>document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{const data=JSON.parse(ev.target.result);for(const k in data){if(k.startsWith('dr-'))localStorage.setItem(k,data[k])}update()}catch(err){alert('导入失败：'+err.message)}};
  r.readAsText(f);e.target.value='';
});
document.getElementById('saveSync').addEventListener('click',()=>{const cfg=readSyncForm();saveSyncConfig(cfg);setSyncStatus(cfg.gistId?'已保存同步配置。':'已保存配置。推送时会新建私有 Gist。','ok')});
document.getElementById('pushSync').addEventListener('click',pushToGist);
document.getElementById('pullSync').addEventListener('click',pullFromGist);
renderRuler();renderLegend();fillSyncForm();update();setInterval(update,1000);
</script>
